<!doctype html>
<html lang="lo">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu Recommendations — Lao & Hmong</title>
  <link rel="stylesheet" href="styles.css">
  <link href='https://fonts.googleapis.com/css?family=Noto Sans Lao' rel='stylesheet'>
</head>
<style>
    * {
        font-family: 'Noto Sans Lao', sans-serif;
    }
</style>
<body>
  <header class="site-header">
    <div class="container">
      <h1>ເມນູແນະນຳ</h1>
      <p class="lead">ກັ່ນຕອງ ແລະ ເບິ່ງຕົວຢ່າງລາຍການເມນູເປັນພາສາລາວ, ມົ້ງ ແລະ ພາສາອັງກິດ. ປັບສະພາບອາກາດ, ອາລົມ ແລະ ງົບປະມານເພື່ອຮັບຄຳແນະນຳທີ່ເໝາະສົມ.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <form id="filters" class="filters-form">
        <div class="row">
          <label>ພາສາ
            <select id="lang">
              <option value="en">ອັງກິດ</option>
              <option value="lo" selected>ລາວ</option>
              <option value="hm">ມົ້ງ</option>
            </select>
          </label>

          <label>ອາກາດເປັນແນວໃດ
            <select id="weather">
              <option value="">Any</option>
              <option value="hot">ຮ້ອນ</option>
              <option value="cold">ເຢັນ</option>
              <option value="rainy">ຝົນຕົກ</option>
            </select>
          </label>

          <label>ຄວາມສະດວກ / ອາລົມ
            <input id="feel" list="feel_options" placeholder="comfort, light, festive, refreshing" />
          </label>
        </div>

        <div class="row">
          <label>ງົບປະມານທີ່ຕ້ອງການ
            <input id="budget" list="budget_options" placeholder="e.g. 20000 or cheap/medium/expensive" />
          </label>

          <label>ປະເພດ
            <input id="category" list="category_options" placeholder="Main, Starter, Staple" />
          </label>

          <label>ສະໄຕ / ແທັກ
            <input id="styles" list="styles_options" placeholder="comma separated: spicy,vegan,grilled" />
          </label>
        </div>

        <!-- Suggested options for inputs: users can pick from these or type their own -->
        <datalist id="feel_options">
  <option value="comfort">ອາຫານກິນແລ້ວອຸ່ນໃຈ</option>
  <option value="light">ອາຫານເບົາໆ</option>
  <option value="festive">ເໝາະກັບງານສັງສັນ</option>
  <option value="refreshing">ສົດຊື່ນ</option>
  <option value="celebration">ເໝາະສຳລັບງານສະເຫຼີມສະຫຼອງ</option>
</datalist>

        <datalist id="budget_options">
          <option value="cheap">ຖືກ</option>
          <option value="medium">ປາງກາງ</option>
          <option value="expensive">ແພງ</option>
          <option value="10000">10000 ₭</option>
          <option value="15000">15000 ₭</option>
          <option value="20000">20000 ₭</option>
        </datalist>

        <datalist id="category_options">
  <option value="Main">ອາຫານຫຼັກ</option>
  <option value="Starter">ອາຫານເປີດມື້</option>
  <option value="Staple">ອາຫານພື້ນຖານ</option>
  <option value="Soup">ອາຫານປະເພດແກງ</option>
  <option value="Snack">ຂອງກິນຫຼິ້ນ</option>
  <option value="Condiment">ເຄື່ອງປຸງລົດ</option>
  <option value="Stew">ອາຫານຕົ້ມປຸງ</option>
</datalist>

       <datalist id="styles_options">
  <option value="spicy">ລົດເຜັດ</option>
  <option value="vegan">ອາຫານເຈ</option>
  <option value="grilled">ອາຫານປີ້ງ/ຢ່າງ</option>
  <option value="salad">ສະຫຼັດ</option>
  <option value="fried">ອາຫານທອດ</option>
  <option value="crispy">ກອບ</option>
  <option value="gluten-free">ບໍ່ມີກລູເຕນ</option>
  <option value="contains-fish">ມີປາເປັນສ່ວນປະກອບ</option>
</datalist>

        <div class="row">
          <label>Top N recommendations
            <input id="topn" type="number" min="1" placeholder="e.g. 3" />
          </label>

          <div class="actions" style="margin-top: 25px;">
            <button id="apply" type="button">ຄົ້ນຫາ</button>
            <button id="reset" type="button" class="secondary">ເລີ່ມໃໝ່</button>
            <!-- <button id="export" type="button" class="secondary">Export JSON</button> -->
          </div>
        </div>
      </form>
    </section>

    <section class="results" id="results">
      <h2>ຈາກເງື່ອນໄຂຂ້າງເທິງ ແນະນຳເມນູອາຫານດັ່ງລຸ່ມນີ່:</h2>
      <div id="list" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>Data: sample_menu.json — translations are placeholders; validate with native speakers before production.</small>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
